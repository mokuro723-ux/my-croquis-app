<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Croquis PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg-color: #000; --panel-bg: #1e1e1e; --btn-bg: #333; --accent: #2d7cff; --hm-color: #ffb020; }
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #top-panel { background-color: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; z-index: 10; }
        #phase-label { color: var(--hm-color); font-weight: bold; width: 100px; font-size: 0.8rem; }
        #timer-label { font-size: 1.5rem; font-weight: bold; flex-grow: 1; text-align: center; }
        .icon-btn { background: none; border: none; color: gray; font-size: 1.2rem; cursor: pointer; }
        #image-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #canvas-area { position: relative; max-width: 100%; max-height: 100%; display: flex; justify-content: center; align-items: center; }
        #main-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.2s; display: none; }
        #grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; border: 1px solid rgba(128,128,128,0.5); background-image: linear-gradient(to right, rgba(128,128,128,0.5) 1px, transparent 1px), linear-gradient(to bottom, rgba(128,128,128,0.5) 1px, transparent 1px); background-size: 33.33% 33.33%; }
        #progress-container { width: 100%; height: 6px; background-color: var(--panel-bg); }
        #progress-bar { width: 100%; height: 100%; background-color: var(--accent); transition: width 1s linear; }
        #bottom-panel { background-color: var(--panel-bg); padding: 8px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; z-index: 10; }
        button { background-color: var(--btn-bg); color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 0.9rem; cursor: pointer; min-width: 40px; }
        button.active { background-color: #555; border: 1px solid var(--accent); }
        button.accent { background-color: var(--accent); }
        button.hard-mode { color: var(--hm-color); font-weight: bold; border: 1px solid transparent; }
        button.hard-mode.active { background-color: var(--hm-color); color: black; }
        .separator { color: #444; margin: 0 2px; align-self: center; }
    </style>
</head>
<body>
    <div id="top-panel">
        <div id="phase-label"></div>
        <div id="timer-label">⏱ 30</div>
        <div style="display:flex; gap:10px;">
            <button id="btn-hm-show" style="display:none; font-size:0.7rem;">③表示</button>
            <button id="btn-hm-hide" style="display:none; font-size:0.7rem;">④隠す</button>
            <button class="icon-btn" id="bg-btn" onclick="cycleBg()">🎨</button>
            <button class="icon-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        </div>
    </div>

    <div id="image-container">
        <div id="canvas-area">
            <img id="main-image" src="">
            <div id="grid-overlay"></div>
        </div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="bottom-panel">
        <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none;">
        <button onclick="document.getElementById('folder-input').click()">📁</button>
        <button onclick="prevImage()">|◁</button>
        <button id="play-btn" class="accent" onclick="toggleTimer()">▷</button>
        <button onclick="nextImage()">▷|</button>
        <span class="separator">|</span>
        <button onclick="setTimer(30)">30s</button>
        <button onclick="setTimer(60)">1m</button>
        <button onclick="setTimer(120)">2m</button>
        <button onclick="setTimer(300)">5m</button>
        <button onclick="setTimer(600)">10m</button>
        <span class="separator">|</span>
        <button id="flipH-btn" onclick="toggle('flipH')">⇄</button>
        <button id="flipV-btn" onclick="toggle('flipV')">⇅</button>
        <button id="shuffle-btn" onclick="toggle('shuffle')" class="active">🔀</button>
        <button id="grid-btn" onclick="toggle('grid')">#</button>
        <button id="mono-btn" onclick="toggle('mono')">🌗</button>
        <button id="hide-btn" onclick="toggle('hide')">👁</button>
        <button class="hard-mode" id="hm-btn" onclick="toggleHardMode()">🧠 ハード</button>
    </div>

    <audio id="sound-player" src="音声.mp3" preload="auto"></audio>

    <script>
        // 基本動作スクリプト（前回同様ですがタイマー周りを整理）
        let images = [], currentIndex = 0, historyStack = [];
        let timerSeconds = 30, remaining = 30, isRunning = false, timerInterval;
        let settings = { flipH: false, flipV: false, shuffle: true, grid: false, mono: false, hide: false };
        let isMuted = false, bgMode = 0, isImageHidden = false, hideTimeout;
        let hmActive = false, hmPhase = 0;
        const hmPhases = { 1: {t: "①暗記", s: 120, h: false}, 2: {t: "②記憶描写", s: 300, h: true}, 3: {t: "③模写", s: 900, h: false}, 4: {t: "④実践", s: 900, h: true} };

        const ui = {
            img: document.getElementById('main-image'), timer: document.getElementById('timer-label'),
            prog: document.getElementById('progress-bar'), playBtn: document.getElementById('play-btn'),
            grid: document.getElementById('grid-overlay'), sound: document.getElementById('sound-player'),
            phase: document.getElementById('phase-label'), hmBtn: document.getElementById('hm-btn')
        };

        document.getElementById('folder-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if(files.length > 0) {
                images = files; if(settings.shuffle) shuffleArray(images);
                currentIndex = 0; loadImage();
            }
        });

        function shuffleArray(arr) { for(let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }

        function loadImage() {
            if(images.length === 0) return;
            clearTimeout(hideTimeout);
            isImageHidden = false;
            ui.img.src = URL.createObjectURL(images[currentIndex]);
            ui.img.style.display = 'block';
            ui.img.onload = () => { applyFilters(); };
            if(settings.hide && !hmActive) {
                hideTimeout = setTimeout(() => { isImageHidden = true; applyFilters(); }, 5000);
            }
        }

        function applyFilters() {
            let transform = '';
            if(settings.flipH) transform += 'scaleX(-1) ';
            if(settings.flipV) transform += 'scaleY(-1) ';
            ui.img.style.transform = transform;
            ui.img.style.filter = settings.mono ? 'grayscale(100%)' : 'none';
            ui.img.style.opacity = isImageHidden ? '0' : '1';
            
            if(settings.grid && !isImageHidden) {
                ui.grid.style.display = 'block';
                ui.grid.style.width = ui.img.clientWidth + 'px';
                ui.grid.style.height = ui.img.clientHeight + 'px';
            } else {
                ui.grid.style.display = 'none';
            }
        }

        window.onresize = applyFilters;

        function toggle(key) {
            settings[key] = !settings[key];
            const btn = document.getElementById(key + '-btn') || document.getElementById(key === 'mono' ? 'mono-btn' : key === 'grid' ? 'grid-btn' : 'hide-btn');
            if(btn) settings[key] ? btn.classList.add("active") : btn.classList.remove("active");
            if(key === 'hide' && !settings.hide) isImageHidden = false;
            applyFilters();
        }

        function nextImage() {
            if(images.length === 0) return;
            if(hmActive) exitHardMode();
            historyStack.push(currentIndex);
            currentIndex = settings.shuffle ? Math.floor(Math.random() * images.length) : (currentIndex + 1) % images.length;
            loadImage(); resetTimer(); playSound();
        }

        function prevImage() {
            if(historyStack.length > 0) {
                if(hmActive) exitHardMode();
                currentIndex = historyStack.pop();
                loadImage(); resetTimer();
            }
        }

        function toggleTimer() { if(images.length > 0) isRunning ? stopTimer() : startTimer(); }
        function startTimer() { isRunning = true; ui.playBtn.innerText = "⏸"; ui.playBtn.classList.remove("accent"); timerInterval = setInterval(tick, 1000); }
        function stopTimer() { isRunning = false; ui.playBtn.innerText = "▷"; ui.playBtn.classList.add("accent"); clearInterval(timerInterval); }
        function tick() { remaining--; updateTimerUI(); if(remaining <= 0) hmActive ? hmNextPhase() : nextImage(); }
        function resetTimer() { remaining = hmActive ? hmPhases[hmPhase].s : timerSeconds; updateTimerUI(); }
        function setTimer(sec) { exitHardMode(); timerSeconds = sec; resetTimer(); }
        function updateTimerUI() { ui.timer.innerText = `⏱ ${remaining}`; const total = hmActive ? hmPhases[hmPhase].s : timerSeconds; ui.prog.style.width = `${(remaining / total) * 100}%`; }
        function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊"; }
        function playSound() { if(!isMuted) { ui.sound.currentTime = 0; ui.sound.play().catch(()=>{}); } }
        function cycleBg() { const colors = ['#000', '#2e2e2e', '#fff']; bgMode = (bgMode + 1) % 3; document.documentElement.style.setProperty('--bg-color', colors[bgMode]); }
        function toggleHardMode() { hmActive ? exitHardMode() : startHardMode(); }
        function startHardMode() { if(images.length === 0) return; hmActive = true; ui.hmBtn.classList.add("active"); setHmPhase(1); startTimer(); }
        function exitHardMode() { hmActive = false; ui.hmBtn.classList.remove("active"); ui.phase.innerText = ""; isImageHidden = false; applyFilters(); resetTimer(); }
        function setHmPhase(p) { hmPhase = p; ui.phase.innerText = hmPhases[p].t; remaining = hmPhases[p].s; isImageHidden = hmPhases[p].h; applyFilters(); playSound(); updateTimerUI(); }
        function hmNextPhase() { if(hmPhase < 4) setHmPhase(hmPhase + 1); else { stopTimer(); ui.phase.innerText = "完了"; playSound(); } }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
    </script>
</body>
</html>
