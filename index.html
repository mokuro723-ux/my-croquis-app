<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Croquis App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Croquis">

    <style>
        :root { 
            --bg-color: #000; 
            --panel-bg: #000; 
            --text-color: #fff; 
            --border-color: #1a1a1a;
            --btn-bg: #222; 
            --accent: #00d4ff; 
            --hm-color: #ffb020; 
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #top-panel { position: relative; height: 60px; background-color: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .top-left { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 150px; }
        .top-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex: 1; max-width: 150px; }
        
        #phase-label { color: var(--hm-color); font-weight: bold; font-size: 0.8rem; white-space: nowrap; }
        #timer-label { position: absolute; left: 50%; transform: translateX(-50%); font-size: 1.8rem; font-weight: bold; text-align: center; color: var(--accent); letter-spacing: 2px; }
        
        .icon-btn { background: none; border: none; color: #888; cursor: pointer; padding: 5px; display: flex; justify-content: center; align-items: center; }
        .icon-btn:hover { color: #fff; }
        
        /* touch-action: none; を追加し、スワイプ時のブラウザ誤動作を防止 */
        #image-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; touch-action: none; }
        #canvas-area { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #main-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; transition: opacity 0.2s; }
        #grid-overlay { position: absolute; pointer-events: none; display: none; border: 1px solid rgba(128,128,128,0.4); background-image: linear-gradient(to right, rgba(128,128,128,0.4) 1px, transparent 1px), linear-gradient(to bottom, rgba(128,128,128,0.4) 1px, transparent 1px); background-size: 33.33% 33.33%; z-index: 5; }
        
        #progress-container { width: 100%; height: 4px; background-color: #111; }
        #progress-bar { width: 100%; height: 100%; background-color: var(--accent); transition: width 0.2s linear; }
        
        #bottom-panel { 
            background-color: var(--panel-bg); 
            padding: 10px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 6px; 
            border-top: 1px solid var(--border-color); 
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
            max-height: 150px; 
            opacity: 1;
            overflow: hidden;
        }
        #bottom-panel.hidden { max-height: 0; padding-top: 0; padding-bottom: 0; border-top: 0px solid transparent; opacity: 0; }
        
        button { background-color: var(--btn-bg); color: #ddd; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; min-width: 45px; display: flex; justify-content: center; align-items: center; }
        button:hover { background-color: #333; }
        button.active { background-color: #444; color: var(--accent); outline: 1px solid var(--accent); }
        button.accent { background-color: var(--accent); color: #000; }
        button.accent:hover { background-color: #00bfff; }
        button.hard-mode { color: var(--hm-color); }
        button.hard-mode.active { background-color: var(--hm-color); color: black; outline: none; }
        
        .separator { color: #333; align-self: center; font-size: 1.2rem; margin: 0 4px; font-weight: 100; }

        .svg-icon { width: 20px; height: 20px; fill: currentColor; pointer-events: none; }
        
        select { outline: none; text-align: center; font-weight: bold; appearance: none; -webkit-appearance: none; padding: 8px 16px; background-color: var(--btn-bg); color: #ddd; border: none; border-radius: 4px; cursor: pointer; }
        select:focus { outline: 1px solid var(--accent); }
        select:hover { background-color: #333; }
        
        .text-btn { font-size: 0.75rem; padding: 4px 8px; min-width: auto; }

        @media (max-width: 440px) {
            #top-panel { padding: 0 8px; }
            .top-left { max-width: 85px; gap: 4px; }
            .top-right { max-width: 105px; gap: 4px; }
            .icon-btn { padding: 3px; }
            .svg-icon { width: 18px; height: 18px; }
            #timer-label { font-size: 1.5rem; letter-spacing: 1px; }
            #phase-label { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div id="top-panel">
        <div class="top-left">
            <div id="phase-label"></div>
            <button class="text-btn" id="btn-hm-show" onclick="isImageHidden=false; applyFilters();" style="display:none;">表示</button>
            <button class="text-btn" id="btn-hm-hide" onclick="isImageHidden=true; applyFilters();" style="display:none;">隠す</button>
        </div>
        
        <div id="timer-label">00:30</div>
        
        <div class="top-right">
            <button class="icon-btn" id="bg-btn" onclick="cycleBg()" title="背景色変更">
                <svg viewBox="0 0 24 24" class="svg-icon"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            </button>
            <button class="icon-btn" id="mute-btn" onclick="toggleMute()" title="消音切替">
                <svg viewBox="0 0 24 24" class="svg-icon" id="icon-vol"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <button class="icon-btn" onclick="toggleBottomPanel()" title="メニュー開閉">
                <svg viewBox="0 0 24 24" class="svg-icon"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
        </div>
    </div>

    <div id="image-container">
        <div id="canvas-area">
            <img id="main-image" src="" draggable="false">
            <div id="grid-overlay"></div>
        </div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="bottom-panel">
        <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none;">
        
        <button onclick="document.getElementById('folder-input').click()" title="フォルダを開く">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        </button>
        
        <button onclick="prevImage()" title="前の画像">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        
        <button id="play-btn" class="accent" onclick="toggleTimer()" title="再生 / 一時停止">
            <svg viewBox="0 0 24 24" class="svg-icon" id="icon-play"><path d="M8 5v14l11-7z"/></svg>
        </button>
        
        <button onclick="nextImage()" title="次の画像">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        
        <span class="separator">|</span>
        
        <select id="time-select" onchange="setTimer(parseInt(this.value))">
            <option value="30">30s</option>
            <option value="60">1m</option>
            <option value="120">2m</option>
            <option value="180">3m</option>
            <option value="300">5m</option>
            <option value="600">10m</option>
        </select>
        
        <span class="separator">|</span>
        
        <button id="shuffle-btn" onclick="toggle('shuffle')" class="active" title="シャッフル">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        
        <button id="flipH-btn" onclick="toggle('flipH')" title="左右反転">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M10,6 L4,12 L10,18 Z" /><rect x="11" y="4" width="2" height="16" /><path d="M14,6 L20,12 L14,18 Z" /></svg>
        </button>
        
        <button id="flipV-btn" onclick="toggle('flipV')" title="上下反転">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M6,10 L12,4 L18,10 Z" /><rect x="4" y="11" width="16" height="2" /><path d="M6,14 L12,20 L18,14 Z" /></svg>
        </button>
        
        <button id="grid-btn" onclick="toggle('grid')" title="グリッド">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M4 4h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 10h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 16h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4z"/></svg>
        </button>
        
        <button id="mono-btn" onclick="toggle('mono')" title="モノクロ">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zm1-17.93c3.95.49 7 3.85 7 7.93s-3.05 7.44-7 7.93V4.07z"/></svg>
        </button>
        
        <button id="hide-btn" onclick="toggle('hide')" title="5秒で画像を隠す">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
        
        <button class="hard-mode" id="hm-btn" onclick="toggleHardMode()" title="ハードモード">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M13,2.05v9h6L7,22v-9H2L13,2.05z"/></svg>
        </button>
    </div>

    <audio id="sound-player" src="音声.mp3" preload="auto"></audio>

    <script>
        let images = [], currentIndex = 0, historyStack = [];
        let timerSeconds = 30, remaining = 30, isRunning = false, timerInterval;
        let settings = { flipH: false, flipV: false, shuffle: true, grid: false, mono: false, hide: false };
        let isMuted = false, bgMode = 0, isImageHidden = false, hideTimeout;
        let hmActive = false, hmPhase = 0;
        const hmPhases = { 1: {t: "①暗記", s: 120, h: false}, 2: {t: "②記憶描写", s: 300, h: true}, 3: {t: "③模写", s: 900, h: false}, 4: {t: "④実践", s: 900, h: true} };
        let currentImageUrl = null, expectedEndTime = 0, resizeTimer;

        const iconPlaySVG = `<svg viewBox="0 0 24 24" class="svg-icon"><path d="M8 5v14l11-7z"/></svg>`;
        const iconPauseSVG = `<svg viewBox="0 0 24 24" class="svg-icon"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
        const iconVolSVG = `<svg viewBox="0 0 24 24" class="svg-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
        const iconMuteSVG = `<svg viewBox="0 0 24 24" class="svg-icon"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;

        const ui = {
            img: document.getElementById('main-image'), timer: document.getElementById('timer-label'),
            prog: document.getElementById('progress-bar'), playBtn: document.getElementById('play-btn'),
            grid: document.getElementById('grid-overlay'), sound: document.getElementById('sound-player'),
            phase: document.getElementById('phase-label'), hmBtn: document.getElementById('hm-btn'),
            btnHmShow: document.getElementById('btn-hm-show'), btnHmHide: document.getElementById('btn-hm-hide'),
            muteBtn: document.getElementById('mute-btn')
        };

        function toggleBottomPanel() {
            const panel = document.getElementById('bottom-panel');
            panel.classList.toggle('hidden');
        }

        document.getElementById('folder-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if(files.length > 0) { 
                images = files; 
                if(settings.shuffle) shuffleArray(images); 
                currentIndex = 0; 
                loadImage(); 
            }
            e.target.value = ''; 
        });

        function shuffleArray(arr) { for(let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }

        function loadImage() {
            if(images.length === 0) return;
            clearTimeout(hideTimeout);
            isImageHidden = false;
            if (currentImageUrl) { URL.revokeObjectURL(currentImageUrl); } 
            currentImageUrl = URL.createObjectURL(images[currentIndex]);
            ui.img.src = currentImageUrl;
            ui.img.style.display = 'block';
            ui.img.onload = applyFilters;
            
            ui.img.onerror = () => {
                console.warn("画像の読み込みに失敗したためスキップします:", images[currentIndex].name);
                nextImage();
            };

            if(settings.hide && !hmActive) { hideTimeout = setTimeout(() => { isImageHidden = true; applyFilters(); }, 5000); }
        }

        function applyFilters() {
            let transform = '';
            if(settings.flipH) transform += 'scaleX(-1) ';
            if(settings.flipV) transform += 'scaleY(-1) ';
            ui.img.style.transform = transform;
            ui.img.style.filter = settings.mono ? 'grayscale(100%)' : 'none';
            ui.img.style.opacity = isImageHidden ? '0' : '1';
            
            if(settings.grid && !isImageHidden && ui.img.complete) {
                ui.grid.style.display = 'block';
                ui.grid.style.width = ui.img.offsetWidth + 'px';
                ui.grid.style.height = ui.img.offsetHeight + 'px';
                ui.grid.style.left = ui.img.offsetLeft + 'px';
                ui.grid.style.top = ui.img.offsetTop + 'px';
            } else { 
                ui.grid.style.display = 'none'; 
            }
        }

        window.addEventListener('resize', () => { 
            clearTimeout(resizeTimer); 
            resizeTimer = setTimeout(applyFilters, 100); 
        });
        
        function toggle(key) { 
            settings[key] = !settings[key]; 
            const btn = document.getElementById(key + '-btn');
            if(btn) settings[key] ? btn.classList.add("active") : btn.classList.remove("active");
            if(key === 'hide' && !settings.hide) isImageHidden = false;
            applyFilters(); 
        }

        function nextImage() { 
            if(images.length === 0) return; 
            if(hmActive) exitHardMode(); 
            historyStack.push(currentIndex); 
            currentIndex = settings.shuffle ? Math.floor(Math.random() * images.length) : (currentIndex + 1) % images.length; 
            loadImage(); 
            resetTimer(); 
            playSound(); 
        }

        function prevImage() { 
            if(historyStack.length > 0) { 
                if(hmActive) exitHardMode(); 
                currentIndex = historyStack.pop(); 
                loadImage(); 
                resetTimer(); 
            } 
        }

        function toggleTimer() { 
            if(images.length > 0) isRunning ? stopTimer() : startTimer(); 
        }

        function startTimer() { 
            isRunning = true; 
            ui.playBtn.innerHTML = iconPauseSVG; 
            ui.playBtn.classList.remove("accent"); 
            expectedEndTime = Date.now() + (remaining * 1000); 
            clearInterval(timerInterval); 
            timerInterval = setInterval(tick, 200); 
        }

        function stopTimer() { 
            isRunning = false; 
            ui.playBtn.innerHTML = iconPlaySVG; 
            ui.playBtn.classList.add("accent"); 
            clearInterval(timerInterval); 
        }

        function tick() { 
            const now = Date.now(); 
            remaining = Math.ceil((expectedEndTime - now) / 1000); 
            if(remaining <= 0) { 
                remaining = 0; 
                updateTimerUI(); 
                hmActive ? hmNextPhase() : nextImage(); 
            } else { 
                updateTimerUI(); 
            } 
        }
        
        function resetTimer() { 
            remaining = hmActive ? hmPhases[hmPhase].s : timerSeconds; 
            if (isRunning) expectedEndTime = Date.now() + (remaining * 1000); 
            updateTimerUI(); 
        }

        function setTimer(sec) { 
            exitHardMode(); 
            timerSeconds = sec; 
            const select = document.getElementById('time-select');
            if (select) select.value = sec; 
            resetTimer(); 
        }
        
        function updateTimerUI() { 
            let m = Math.floor(remaining / 60); 
            let s = remaining % 60; 
            ui.timer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; 
            const total = hmActive ? hmPhases[hmPhase].s : timerSeconds; 
            ui.prog.style.width = `${(remaining / total) * 100}%`; 
        }

        function toggleMute() { 
            isMuted = !isMuted; 
            ui.muteBtn.innerHTML = isMuted ? iconMuteSVG : iconVolSVG; 
        }

        function playSound() { 
            if(!isMuted) { 
                ui.sound.currentTime = 0; 
                ui.sound.play().catch(()=>{}); 
            } 
        }

        function cycleBg() { 
            const colors = ['#000', '#2e2e2e', '#fff']; 
            bgMode = (bgMode + 1) % 3; 
            document.documentElement.style.setProperty('--bg-color', colors[bgMode]); 
        }

        function toggleHardMode() { hmActive ? exitHardMode() : startHardMode(); }
        
        function startHardMode() { 
            if(images.length === 0) return; 
            hmActive = true; 
            ui.hmBtn.classList.add("active"); 
            setHmPhase(1); 
            startTimer(); 
        }

        function exitHardMode() { 
            hmActive = false; 
            ui.hmBtn.classList.remove("active"); 
            ui.phase.innerText = ""; 
            isImageHidden = false; 
            ui.btnHmShow.style.display = 'none'; 
            ui.btnHmHide.style.display = 'none'; 
            applyFilters(); 
            resetTimer(); 
        }

        function setHmPhase(p) { 
            hmPhase = p; 
            ui.phase.innerText = hmPhases[p].t; 
            remaining = hmPhases[p].s; 
            isImageHidden = hmPhases[p].h; 
            if (isRunning) expectedEndTime = Date.now() + (remaining * 1000); 
            applyFilters(); 
            playSound(); 
            updateTimerUI(); 
        }

        function hmNextPhase() { 
            if(hmPhase < 4) { 
                setHmPhase(hmPhase + 1); 
            } else { 
                stopTimer(); 
                ui.phase.innerText = "完了"; 
                ui.btnHmShow.style.display = 'block'; 
                ui.btnHmHide.style.display = 'block'; 
                playSound(); 
            } 
        }

        // --- キーボードショートカット ---
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'SELECT' || document.activeElement.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); toggleTimer(); } 
            else if (e.code === 'ArrowRight') { nextImage(); } 
            else if (e.code === 'ArrowLeft') { prevImage(); }
        });

        // --- ジェスチャー操作（スワイプ＆ダブルタップ） ---
        let pointerStartX = 0;
        let lastTapTime = 0;
        const imgContainer = document.getElementById('image-container');

        // タッチやマウス、ペンが画面に触れた時の座標を記録
        imgContainer.addEventListener('pointerdown', (e) => {
            pointerStartX = e.clientX;
        });

        // 離した時の座標を計算して動作を決定
        imgContainer.addEventListener('pointerup', (e) => {
            const pointerEndX = e.clientX;
            const diffX = pointerStartX - pointerEndX;
            const threshold = 50; // 50px以上動かした場合のみスワイプと判定（誤操作防止）

            if (Math.abs(diffX) > threshold) {
                // スワイプ処理
                if (diffX > 0) {
                    nextImage(); // 左にスワイプ ➔ 次へ
                } else {
                    prevImage(); // 右にスワイプ ➔ 前へ
                }
                lastTapTime = 0; // スワイプした時はダブルタップ判定をリセット
            } else {
                // タップ（クリック）処理
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;
                
                // 300ミリ秒以内に2回連続でタップされた場合（ダブルタップ）
                if (tapLength < 300 && tapLength > 0) {
                    toggleTimer(); // 再生 / 一時停止
                    lastTapTime = 0; // 判定リセット
                    e.preventDefault();
                } else {
                    lastTapTime = currentTime; // 1回目のタップ時間を記録
                }
            }
        });
    </script>
</body>
</html>
