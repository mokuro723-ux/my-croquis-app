<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Croquis App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Croquis">

    <style>
        :root { 
            --bg-color: #000; 
            --panel-bg: #000; 
            --text-color: #fff; 
            --border-color: #1a1a1a;
            --btn-bg: #222; 
            --accent: #00d4ff; 
            --hm-color: #ffb020; 
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #top-panel { height: 60px; background-color: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 100; border-bottom: 1px solid var(--border-color); }
        #phase-label { color: var(--hm-color); font-weight: bold; width: 100px; font-size: 0.8rem; }
        #timer-label { font-size: 1.8rem; font-weight: bold; flex-grow: 1; text-align: center; color: var(--accent); letter-spacing: 2px; }
        .icon-btn { background: none; border: none; color: #888; font-size: 1.3rem; cursor: pointer; padding: 5px; }
        
        #image-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        #canvas-area { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #main-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; transition: opacity 0.2s; }
        #grid-overlay { position: absolute; pointer-events: none; display: none; border: 1px solid rgba(128,128,128,0.4); background-image: linear-gradient(to right, rgba(128,128,128,0.4) 1px, transparent 1px), linear-gradient(to bottom, rgba(128,128,128,0.4) 1px, transparent 1px); background-size: 33.33% 33.33%; z-index: 5; }
        
        #progress-container { width: 100%; height: 4px; background-color: #111; }
        #progress-bar { width: 100%; height: 100%; background-color: var(--accent); transition: width 0.2s linear; }
        
        /* ボトムパネルのアニメーション開閉設定 */
        #bottom-panel { 
            background-color: var(--panel-bg); 
            padding: 10px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 6px; 
            border-top: 1px solid var(--border-color); 
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
            max-height: 150px; 
            opacity: 1;
            overflow: hidden;
        }
        #bottom-panel.hidden {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-top: 0px solid transparent;
            opacity: 0;
        }
        
        button, select { background-color: var(--btn-bg); color: #ddd; border: none; padding: 8px 12px; border-radius: 4px; font-size: 0.9rem; cursor: pointer; min-width: 45px; }
        button.active { background-color: #444; color: var(--accent); outline: 1px solid var(--accent); }
        button.accent { background-color: var(--accent); color: #000; font-weight: bold; }
        button.hard-mode { color: var(--hm-color); }
        button.hard-mode.active { background-color: var(--hm-color); color: black; }
        .separator { color: #444; align-self: center; font-size: 1.2rem; margin: 0 4px; }

        /* SVGアイコンのスタイル */
        .svg-icon { width: 18px; height: 18px; fill: currentColor; vertical-align: middle; }
        button.active .svg-icon { fill: var(--accent); }
        
        /* セレクトボックス（時間選択）のスタイル */
        select { 
            outline: none; 
            text-align: center; 
            font-weight: bold; 
            appearance: none; 
            -webkit-appearance: none;
            padding: 8px 16px;
        }
        select:focus { outline: 1px solid var(--accent); }
    </style>
</head>
<body>
    <div id="top-panel">
        <div id="phase-label"></div>
        <div id="timer-label">00:30</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button id="btn-hm-show" onclick="isImageHidden=false; applyFilters();" style="display:none; font-size:0.7rem;">表示</button>
            <button id="btn-hm-hide" onclick="isImageHidden=true; applyFilters();" style="display:none; font-size:0.7rem;">隠す</button>
            <button class="icon-btn" id="bg-btn" onclick="cycleBg()" title="背景色変更">🎨</button>
            <button class="icon-btn" id="mute-btn" onclick="toggleMute()" title="消音">🔊</button>
            
            <button class="icon-btn" onclick="toggleBottomPanel()" title="メニュー開閉">
                <svg viewBox="0 0 24 24" class="svg-icon" style="width:24px;height:24px;">
                    <path d="M3,18h18v-2H3v2z M3,13h18v-2H3v2z M3,6v2h18V6H3z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="image-container">
        <div id="canvas-area">
            <img id="main-image" src="">
            <div id="grid-overlay"></div>
        </div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="bottom-panel">
        <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none;">
        <button onclick="document.getElementById('folder-input').click()">📁</button>
        <button onclick="prevImage()">|◁</button>
        <button id="play-btn" class="accent" onclick="toggleTimer()">▷</button>
        <button onclick="nextImage()">▷|</button>
        
        <span class="separator">|</span>
        
        <select id="time-select" onchange="setTimer(parseInt(this.value))">
            <option value="30">30s</option>
            <option value="60">1m</option>
            <option value="120">2m</option>
            <option value="300">5m</option>
            <option value="600">10m</option>
        </select>
        
        <span class="separator">|</span>
        
        <button id="shuffle-btn" onclick="toggle('shuffle')" class="active">🔀</button>
        
        <button id="flipH-btn" onclick="toggle('flipH')" title="左右反転">
            <svg viewBox="0 0 24 24" class="svg-icon">
                <path d="M10,6 L4,12 L10,18 Z" />
                <rect x="11" y="4" width="2" height="16" />
                <path d="M14,6 L20,12 L14,18 Z" />
            </svg>
        </button>
        
        <button id="flipV-btn" onclick="toggle('flipV')" title="上下反転">
            <svg viewBox="0 0 24 24" class="svg-icon">
                <path d="M6,10 L12,4 L18,10 Z" />
                <rect x="4" y="11" width="16" height="2" />
                <path d="M6,14 L12,20 L18,14 Z" />
            </svg>
        </button>
        
        <button id="grid-btn" onclick="toggle('grid')">#</button>
        <button id="mono-btn" onclick="toggle('mono')">🌗</button>
        <button id="hide-btn" onclick="toggle('hide')">👁</button>
        <button class="hard-mode" id="hm-btn" onclick="toggleHardMode()">🧠</button>
    </div>

    <audio id="sound-player" src="音声.mp3" preload="auto"></audio>

    <script>
        let images = [], currentIndex = 0, historyStack = [];
        let timerSeconds = 30, remaining = 30, isRunning = false, timerInterval;
        let settings = { flipH: false, flipV: false, shuffle: true, grid: false, mono: false, hide: false };
        let isMuted = false, bgMode = 0, isImageHidden = false, hideTimeout;
        let hmActive = false, hmPhase = 0;
        const hmPhases = { 1: {t: "①暗記", s: 120, h: false}, 2: {t: "②記憶描写", s: 300, h: true}, 3: {t: "③模写", s: 900, h: false}, 4: {t: "④実践", s: 900, h: true} };
        let currentImageUrl = null, expectedEndTime = 0, resizeTimer;

        const ui = {
            img: document.getElementById('main-image'), timer: document.getElementById('timer-label'),
            prog: document.getElementById('progress-bar'), playBtn: document.getElementById('play-btn'),
            grid: document.getElementById('grid-overlay'), sound: document.getElementById('sound-player'),
            phase: document.getElementById('phase-label'), hmBtn: document.getElementById('hm-btn'),
            btnHmShow: document.getElementById('btn-hm-show'), btnHmHide: document.getElementById('btn-hm-hide')
        };

        // ボトムパネルの開閉
        function toggleBottomPanel() {
            const panel = document.getElementById('bottom-panel');
            panel.classList.toggle('hidden');
        }

        document.getElementById('folder-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if(files.length > 0) { 
                images = files; 
                if(settings.shuffle) shuffleArray(images); 
                currentIndex = 0; 
                loadImage(); 
            }
            e.target.value = ''; // 連続で同じフォルダを読めるようにリセット
        });

        function shuffleArray(arr) { for(let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }

        function loadImage() {
            if(images.length === 0) return;
            clearTimeout(hideTimeout);
            isImageHidden = false;
            if (currentImageUrl) { URL.revokeObjectURL(currentImageUrl); } // メモリリーク防止
            currentImageUrl = URL.createObjectURL(images[currentIndex]);
            ui.img.src = currentImageUrl;
            ui.img.style.display = 'block';
            ui.img.onload = applyFilters;
            if(settings.hide && !hmActive) { hideTimeout = setTimeout(() => { isImageHidden = true; applyFilters(); }, 5000); }
        }

        function applyFilters() {
            let transform = '';
            if(settings.flipH) transform += 'scaleX(-1) ';
            if(settings.flipV) transform += 'scaleY(-1) ';
            ui.img.style.transform = transform;
            ui.img.style.filter = settings.mono ? 'grayscale(100%)' : 'none';
            ui.img.style.opacity = isImageHidden ? '0' : '1';
            
            // グリッドを画像サイズに正確に合わせる
            if(settings.grid && !isImageHidden && ui.img.complete) {
                ui.grid.style.display = 'block';
                ui.grid.style.width = ui.img.offsetWidth + 'px';
                ui.grid.style.height = ui.img.offsetHeight + 'px';
                ui.grid.style.left = ui.img.offsetLeft + 'px';
                ui.grid.style.top = ui.img.offsetTop + 'px';
            } else { 
                ui.grid.style.display = 'none'; 
            }
        }

        window.addEventListener('resize', () => { 
            clearTimeout(resizeTimer); 
            resizeTimer = setTimeout(applyFilters, 100); 
        });
        
        function toggle(key) { 
            settings[key] = !settings[key]; 
            const btn = document.getElementById(key + '-btn');
            if(btn) settings[key] ? btn.classList.add("active") : btn.classList.remove("active");
            if(key === 'hide' && !settings.hide) isImageHidden = false;
            applyFilters(); 
        }

        function nextImage() { 
            if(images.length === 0) return; 
            if(hmActive) exitHardMode(); 
            historyStack.push(currentIndex); 
            currentIndex = settings.shuffle ? Math.floor(Math.random() * images.length) : (currentIndex + 1) % images.length; 
            loadImage(); 
            resetTimer(); 
            playSound(); 
        }

        function prevImage() { 
            if(historyStack.length > 0) { 
                if(hmActive) exitHardMode(); 
                currentIndex = historyStack.pop(); 
                loadImage(); 
                resetTimer(); 
            } 
        }

        function toggleTimer() { 
            if(images.length > 0) isRunning ? stopTimer() : startTimer(); 
        }

        function startTimer() { 
            isRunning = true; 
            ui.playBtn.innerText = "⏸"; 
            ui.playBtn.classList.remove("accent"); 
            expectedEndTime = Date.now() + (remaining * 1000); 
            clearInterval(timerInterval); // 二重起動防止
            timerInterval = setInterval(tick, 200); 
        }

        function stopTimer() { 
            isRunning = false; 
            ui.playBtn.innerText = "▷"; 
            ui.playBtn.classList.add("accent"); 
            clearInterval(timerInterval); 
        }

        function tick() { 
            const now = Date.now(); 
            remaining = Math.ceil((expectedEndTime - now) / 1000); 
            if(remaining <= 0) { 
                remaining = 0; 
                updateTimerUI(); 
                hmActive ? hmNextPhase() : nextImage(); 
            } else { 
                updateTimerUI(); 
            } 
        }
        
        function resetTimer() { 
            remaining = hmActive ? hmPhases[hmPhase].s : timerSeconds; 
            if (isRunning) expectedEndTime = Date.now() + (remaining * 1000); 
            updateTimerUI(); 
        }

        function setTimer(sec) { 
            exitHardMode(); 
            timerSeconds = sec; 
            const select = document.getElementById('time-select');
            if (select) select.value = sec; 
            resetTimer(); 
        }
        
        function updateTimerUI() { 
            let m = Math.floor(remaining / 60); 
            let s = remaining % 60; 
            ui.timer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; 
            const total = hmActive ? hmPhases[hmPhase].s : timerSeconds; 
            ui.prog.style.width = `${(remaining / total) * 100}%`; 
        }

        function toggleMute() { 
            isMuted = !isMuted; 
            document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊"; 
        }

        function playSound() { 
            if(!isMuted) { 
                ui.sound.currentTime = 0; 
                ui.sound.play().catch(()=>{}); 
            } 
        }

        function cycleBg() { 
            const colors = ['#000', '#2e2e2e', '#fff']; 
            bgMode = (bgMode + 1) % 3; 
            document.documentElement.style.setProperty('--bg-color', colors[bgMode]); 
        }

        function toggleHardMode() { hmActive ? exitHardMode() : startHardMode(); }
        
        function startHardMode() { 
            if(images.length === 0) return; 
            hmActive = true; 
            ui.hmBtn.classList.add("active"); 
            setHmPhase(1); 
            startTimer(); 
        }

        function exitHardMode() { 
            hmActive = false; 
            ui.hmBtn.classList.remove("active"); 
            ui.phase.innerText = ""; 
            isImageHidden = false; 
            ui.btnHmShow.style.display = 'none'; 
            ui.btnHmHide.style.display = 'none'; 
            applyFilters(); 
            resetTimer(); 
        }

        function setHmPhase(p) { 
            hmPhase = p; 
            ui.phase.innerText = hmPhases[p].t; 
            remaining = hmPhases[p].s; 
            isImageHidden = hmPhases[p].h; 
            if (isRunning) expectedEndTime = Date.now() + (remaining * 1000); 
            applyFilters(); 
            playSound(); 
            updateTimerUI(); 
        }

        function hmNextPhase() { 
            if(hmPhase < 4) { 
                setHmPhase(hmPhase + 1); 
            } else { 
                stopTimer(); 
                ui.phase.innerText = "完了"; 
                ui.btnHmShow.style.display = 'block'; 
                ui.btnHmHide.style.display = 'block'; 
                playSound(); 
            } 
        }

        // PC向け：キーボードショートカット
        document.addEventListener('keydown', (e) => {
            // セレクトボックス等を開いている時は反応させない
            if (document.activeElement.tagName === 'SELECT' || document.activeElement.tagName === 'INPUT') return;
            
            if (e.code === 'Space') { 
                e.preventDefault(); // 画面スクロール防止
                toggleTimer(); 
            } else if (e.code === 'ArrowRight') { 
                nextImage(); 
            } else if (e.code === 'ArrowLeft') { 
                prevImage(); 
            }
        });
    </script>
</body>
</html>
